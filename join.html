  <style>
    /* ── GLOBAL RESET ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow-x: hidden; max-width: 100vw; }
    img { max-width: 100%; height: auto; display: block; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #fdfaf4;
      color: #4a4a4a;
    }

    /* ── PAGE WRAPPER ── */
    .page-wrap {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 40px;
    }
    @media (min-width: 1024px) {
      .page-wrap { padding: 40px 20px; }
    }

    /* ── BACK BUTTON ── */
    .back-nav {
      position: absolute;
      top: 20px;
      left: 20px;
    }
    .back-btn {
      background: transparent;
      border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: rgba(74,74,74,0.6);
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.2s ease;
    }
    .back-btn:hover { color: #2a1f0e; }

    /* ── CONTENT ── */
    .bridge-content {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* ── LOGO ── */
    .bridge-logo {
      height: 48px;
      margin-bottom: 32px;
    }

    /* ── DISCOUNT BADGE ── */
    .discount-badge {
      background: #FFB82E;
      color: #2a1f0e;
      font-family: 'Lora', serif;
      font-size: 48px;
      font-weight: 700;
      border-radius: 50%;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      flex-shrink: 0;
    }

    /* ── HEADLINE ── */
    .bridge-headline {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 700;
      color: #2a1f0e;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    /* ── SUBHEADLINE ── */
    .bridge-sub {
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      color: rgba(74,74,74,0.7);
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto 32px;
    }

    /* ── DISCOUNT CODE BOX ── */
    .discount-code-box {
      border: 2px solid #FFB82E;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
      max-width: 320px;
      width: 100%;
      margin: 0 auto 32px;
      background: #fffdf9;
    }
    .discount-label {
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: rgba(74,74,74,0.5);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .discount-code {
      font-family: 'Lora', serif;
      font-size: 36px;
      font-weight: 700;
      color: #FFB82E;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }
    .copy-btn {
      background: #FFB82E;
      color: #2a1f0e;
      border: none;
      border-radius: 24px;
      padding: 10px 24px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    /* ── PRIMARY CTA ── */
    .bridge-cta {
      display: block;
      width: 100%;
      max-width: 400px;
      height: 52px;
      background: #FFB82E;
      color: #2a1f0e;
      border: none;
      border-radius: 26px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin: 0 auto 16px;
      transition: background 0.2s ease;
    }
    .bridge-cta:hover { background: #d88609; color: #fff5e1; }

    /* ── BOTTOM NOTE ── */
    .bridge-note {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      color: rgba(74,74,74,0.4);
      text-align: center;
    }

<body>

  <div class="page-wrap">

    <!-- Back Button -->
    <div class="back-nav">
      <button class="back-btn" onclick="history.back()">
        &larr; Back
      </button>
    </div>

    <div class="bridge-content">

      <!-- Logo -->
      <img src="images/TGP-2.png"
           class="bridge-logo"
           alt="The Gastronomy Project"
           onerror="this.src='https://cdn.prod.website-files.com/6893d0739e02449a840a43d0/689a8a5af5bcb41edea78ce7_navbarlogoaccent.svg'">

      <!-- Discount Badge -->
      <div class="discount-badge">15% OFF</div>

      <!-- Headline -->
      <h1 class="bridge-headline">Your launch discount is ready.</h1>

      <!-- Subheadline -->
      <p class="bridge-sub">You'll enter your email on the next page to create your profile and add your discount code at the end.</p>

      <!-- Discount Code Box -->
      <div class="discount-code-box">
        <div class="discount-label">YOUR DISCOUNT CODE</div>
        <div class="discount-code" id="discount-code">TGP15</div>
        <button class="copy-btn" onclick="copyCode()" id="copy-btn">
          Click to Copy
        </button>
      </div>

      <!-- Primary CTA -->
      <button class="bridge-cta" onclick="proceedToIntake()">
        Continue to Create My Profile &rarr;
      </button>

      <!-- Bottom Note -->
      <div class="bridge-note">No payment now &middot; Cancel anytime &middot; Ships to all 50 states</div>

    </div>
  </div>

  <script>
  // ── sessionStorage helpers ──
  function getPlan() {
    try { return sessionStorage.getItem('plan') || 'short-term'; }
    catch(e) { return 'short-term'; }
  }
  function setPlan(key) {
    try { sessionStorage.setItem('plan', key); }
    catch(e) { /* silent fail */ }
  }

  // ── Copy code to clipboard ──
  function copyCode() {
    var code = document.getElementById('discount-code').innerText;
    var btn = document.getElementById('copy-btn');
    function showCopied() {
      btn.innerText = '✓ Copied!';
      btn.style.background = '#2a1f0e';
      btn.style.color = '#FFB82E';
      setTimeout(function() {
        btn.innerText = 'Click to Copy';
        btn.style.background = '#FFB82E';
        btn.style.color = '#2a1f0e';
      }, 2000);
    }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(code).then(showCopied).catch(showCopied);
    } else {
      showCopied();
    }
  }

  // ── Proceed to Bask intake ──
  function proceedToIntake() {
    var routes = {
      'short-term': 'https://go.thegastronomyproject.com/start-online-visit/gingerfamotidine',
      'long-term':  'https://go.thegastronomyproject.com/start-online-visit/gingeromeprazole',
      'GI-comfort': 'https://go.thegastronomyproject.com/start-online-visit/gingerondansetron',
      'med-effect': 'https://go.thegastronomyproject.com/start-online-visit/gingerondansetron',
      'gpack':      'https://go.thegastronomyproject.com/start-online-visit/gpkg-pack',
      'mastic':     'https://go.thegastronomyproject.com/start-online-visit/mastic',
      'ginger':     'https://go.thegastronomyproject.com/start-online-visit/main'
    };
    var plan = getPlan();
    window.location.href = routes[plan] || 'https://go.thegastronomyproject.com/start-online-visit/main';
  }
  </script>
